# Dev-only PostgreSQL for machines without a local Postgres install.
#
# The app stores accounts, church profiles, encrypted S&S links, and past
# runs in PostgreSQL (see src/bulletin_maker/web/db.py). Bring this up with
# `docker compose -f docker-compose.dev.yml up -d`, then point the app at it:
#
#   export DATABASE_URL=postgresql://bulletin:bulletin@localhost:5432/bulletin_maker
#
# The user emails column uses the citext type, so enable the extension in
# the dev DB and create the test DB once after the container is healthy:
#
#   docker compose -f docker-compose.dev.yml exec db \
#     psql -U bulletin -d bulletin_maker -c "CREATE EXTENSION IF NOT EXISTS citext"
#   docker compose -f docker-compose.dev.yml exec db \
#     psql -U bulletin -d postgres -c "CREATE DATABASE bulletin_maker_test"
#   docker compose -f docker-compose.dev.yml exec db \
#     psql -U bulletin -d bulletin_maker_test -c "CREATE EXTENSION IF NOT EXISTS citext"
#
# The schema itself is applied automatically from migrations/*.sql on first
# connection — no manual DDL needed.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bulletin
      POSTGRES_PASSWORD: bulletin
      POSTGRES_DB: bulletin_maker
    ports:
      - "5432:5432"
    volumes:
      - bulletin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulletin -d bulletin_maker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bulletin_pgdata:
